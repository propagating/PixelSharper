name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-test:
    # Windows-first project: OpenTK's native libraries ship with the Windows runtime, so the (headless)
    # unit tests load them and pass here. A Linux leg would need the native libs apt-installed first.
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore PixelSharper.sln

      # Core builds with <TreatWarningsAsErrors>, so any new warning fails the build here.
      - name: Build (Release)
        run: dotnet build PixelSharper.sln -c Release --no-restore

      # Unit tests are headless. Integration tests (e.g. the TCP loopback) are excluded — sockets/timing
      # are flaky on CI; run them locally. A trx is always produced so any failure is diagnosable.
      - name: Test (Release)
        run: dotnet test PixelSharper.sln -c Release --no-build --verbosity normal --filter "TestCategory!=Integration" --logger "trx;LogFileName=test-results.trx" --results-directory test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/**/*.trx
          if-no-files-found: warn

      # Verify the library still packs to a referenceable .nupkg (the NESharp consumer path).
      - name: Pack (Core)
        run: dotnet pack PixelSharper.Core/PixelSharper.Core.csproj -c Release --no-build -o artifacts

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: PixelSharper.Core.nupkg
          path: artifacts/*.nupkg
          if-no-files-found: error
